name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-and-smoke-test:
    name: Build compiler and compile examples
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run POSIX smoke tests
        run: make smoke

      - name: Run PowerShell smoke tests
        shell: pwsh
        run: ./scripts/smoke-test.ps1 -BuildDir build-pwsh
